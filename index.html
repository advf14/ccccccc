<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chóngu</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #F1EFFA; --panel: #FFFFFF; --soft: #F6F5FC; --soft2: #EEEDF7;
    --text: #211F2B; --text2: #6B6979; --text3: #A7A5B4; --border: #EAE8F2;
    --a1: #6C5CE7; --a2: #A66CFF;
    --grad: linear-gradient(135deg, #6C5CE7, #A66CFF);
    --grad-warm: linear-gradient(135deg, #FF8A5B, #FF5C8A);
    --green: #24C286;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; overflow: hidden; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea { font-family: inherit; }
  svg { width: 20px; height: 20px; display: block; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #d8d6e6; border-radius: 8px; }
  @keyframes popIn { from { opacity:0; transform: translateY(16px) scale(.96);} to { opacity:1; transform:none; } }
  @keyframes bubbleIn { from { opacity:0; transform: translateY(10px) scale(.97);} to { opacity:1; transform:none; } }
  @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
  @keyframes floatY { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-5px);} }
  @keyframes livePulse { 0%,100%{ box-shadow:0 0 0 0 rgba(255,92,138,.55);} 50%{ box-shadow:0 0 0 8px rgba(255,92,138,0);} }
  @keyframes dotB { 0%,60%,100%{ transform: translateY(0); opacity:.35;} 30%{ transform: translateY(-4px); opacity:1;} }
  @keyframes tileIn { from{opacity:0; transform:scale(.9);} to{opacity:1; transform:none;} }
  #login { position: fixed; inset: 0; z-index: 100; display:flex; align-items:center; justify-content:center; padding: 24px; background: radial-gradient(1000px 500px at 15% 0%, #efe9ff, var(--bg)), radial-gradient(800px 500px at 100% 100%, #ffe9f2, transparent); }
  .login-card { width:100%; max-width: 400px; background: var(--panel); border-radius: 24px; padding: 36px 32px; box-shadow: 0 20px 60px rgba(108,92,231,.18); animation: popIn .5s cubic-bezier(.2,.8,.2,1) both; }
  .mascot { width: 76px; height:76px; border-radius: 22px; background: var(--grad); display:flex; align-items:center; justify-content:center; margin: 0 auto 16px; box-shadow: 0 10px 26px rgba(108,92,231,.4); animation: floatY 3.5s ease-in-out infinite; color:#fff; }
  .mascot svg { width: 38px; height: 38px; }
  .login-card h1 { text-align:center; font-size: 24px; font-weight: 800; letter-spacing:-.4px; }
  .login-card h1 b { background: var(--grad); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color: transparent; }
  .login-sub { text-align:center; color: var(--text2); font-size: 14px; margin: 6px 0 24px; }
  .field { margin-bottom: 16px; }
  .field label { display:block; font-size: 13px; font-weight:600; color: var(--text2); margin-bottom: 7px; }
  .field input { width:100%; padding: 13px 15px; border-radius: 12px; background: var(--soft); border: 2px solid transparent; color: var(--text); font-size: 15px; transition: border-color .15s, background .15s; }
  .field input:focus { outline:none; border-color: var(--a1); background: #fff; }
  .swatches { display:flex; gap: 10px; }
  .swatches button { width: 40px; height:40px; border-radius: 50%; border: 3px solid transparent; transition: transform .12s; }
  .swatches button:hover { transform: scale(1.08); }
  .swatches button.sel { border-color: var(--text); }
  .btn { width:100%; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; color:#fff; background: var(--grad); box-shadow: 0 8px 20px rgba(108,92,231,.35); transition: transform .12s, filter .15s; }
  .btn:hover { filter: brightness(1.05); }
  .btn:active { transform: scale(.98); }
  .login-hint { text-align:center; color: var(--text3); font-size: 12px; margin-top: 16px; }
  #app { display:none; height: 100%; padding: 14px; }
  .layout { display:grid; grid-template-columns: 300px 1fr; gap: 14px; height: 100%; }
  .sidebar { background: var(--panel); border-radius: 22px; display:flex; flex-direction:column; overflow:hidden; box-shadow: 0 6px 24px rgba(33,31,43,.05); }
  .sb-head { padding: 20px; display:flex; align-items:center; gap: 12px; }
  .sb-head .logo { width: 42px; height:42px; border-radius: 13px; background: var(--grad); display:flex; align-items:center; justify-content:center; color:#fff; box-shadow: 0 6px 16px rgba(108,92,231,.35); }
  .sb-head .tt { font-weight: 800; font-size: 17px; letter-spacing:-.3px; }
  .sb-head .tt span { display:block; font-size: 11px; font-weight:600; color: var(--green); }
  .sb-search { margin: 0 16px 8px; }
  .sb-search input { width:100%; padding: 10px 14px; border-radius: 11px; background: var(--soft); border: 2px solid transparent; font-size: 14px; transition: border-color .15s; }
  .sb-search input:focus { outline:none; border-color: var(--a1); background:#fff; }
  .rooms-title { display:flex; align-items:center; justify-content:space-between; padding: 14px 22px 8px; color: var(--text3); font-size: 11px; font-weight: 800; letter-spacing:.6px; text-transform: uppercase; }
  .rooms-title button { width:24px; height:24px; border-radius:8px; background: var(--soft); color: var(--a1); display:flex; align-items:center; justify-content:center; transition: background .15s, transform .12s; }
  .rooms-title button svg { width:16px; height:16px; }
  .rooms-title button:hover { background: var(--soft2); transform: scale(1.08); }
  .rooms { flex:1; overflow-y:auto; padding: 0 12px; }
  .room { display:flex; align-items:center; gap: 12px; padding: 10px; border-radius: 14px; width:100%; text-align:left; transition: background .15s, transform .1s; margin-bottom: 2px; }
  .room:hover { background: var(--soft); }
  .room:active { transform: scale(.99); }
  .room.active { background: var(--soft2); }
  .av { border-radius: 13px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; flex-shrink:0; }
  .room .av { width: 42px; height:42px; font-size: 17px; }
  .room .rr { min-width:0; flex:1; }
  .room .rr .n { font-weight: 700; font-size: 15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .room .rr .d { font-size: 12px; color: var(--text3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .room.active .rr .n { color: var(--a1); }
  .me-card { margin: 10px; padding: 12px; border-radius: 16px; background: var(--soft); display:flex; align-items:center; gap: 11px; }
  .me-card .av { width: 40px; height:40px; font-size: 16px; }
  .me-card .info { flex:1; min-width:0; }
  .me-card .info .n { font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .me-card .info .s { font-size:12px; color: var(--green); font-weight:600; }
  .me-card .lo { width:34px;height:34px;border-radius:10px; color:var(--text3); display:flex;align-items:center;justify-content:center; transition: background .15s,color .15s; }
  .me-card .lo:hover { background:#fff; color:#FF5C8A; }
  .main { background: var(--panel); border-radius: 22px; display:flex; flex-direction:column; overflow:hidden; min-width:0; box-shadow: 0 6px 24px rgba(33,31,43,.05); position:relative; }
  .chat-head { padding: 16px 22px; border-bottom: 1px solid var(--border); display:flex; align-items:center; gap: 14px; }
  .chat-head .av { width: 44px; height:44px; font-size: 18px; }
  .chat-head .ci { min-width:0; }
  .chat-head .ci .t { font-weight: 800; font-size: 17px; letter-spacing:-.3px; }
  .chat-head .ci .d { font-size: 13px; color: var(--text3); }
  .head-actions { margin-left:auto; display:flex; align-items:center; gap: 10px; }
  .stack { display:flex; align-items:center; }
  .stack .s { width: 32px; height:32px; border-radius:50%; display:flex;align-items:center;justify-content:center; font-size:13px; font-weight:700; color:#fff; margin-left:-8px; border: 2px solid #fff; }
  .stack .more { background: var(--soft2) !important; color: var(--text2) !important; font-size: 12px; }
  .icon-btn { width: 42px; height:42px; border-radius: 13px; background: var(--soft); color: var(--text2); display:flex;align-items:center;justify-content:center; transition: background .15s, transform .12s, box-shadow .15s; }
  .icon-btn:hover { background: var(--soft2); }
  .icon-btn:active { transform: scale(.9); }
  .icon-btn.call { background: var(--grad-warm); color:#fff; box-shadow: 0 6px 16px rgba(255,92,138,.35); }
  .icon-btn.call:hover { filter: brightness(1.06); }
  .messages { flex:1; overflow-y:auto; padding: 22px; display:flex; flex-direction:column; gap: 12px; background: radial-gradient(600px 300px at 100% 0%, #f7f4ff, transparent); }
  .day-sep { align-self:center; background: var(--soft2); color: var(--text2); font-size: 12px; font-weight:600; padding: 4px 12px; border-radius: 20px; margin: 4px 0; }
  .row { display:flex; gap: 10px; align-items:flex-end; max-width: 72%; animation: bubbleIn .28s cubic-bezier(.2,.8,.2,1) both; }
  .row.me { align-self:flex-end; flex-direction: row-reverse; }
  .row .av { width: 34px; height:34px; border-radius: 11px; font-size:14px; }
  .row .col { min-width:0; }
  .row .who { font-size: 12px; font-weight:700; color: var(--text2); margin: 0 0 3px 4px; }
  .bubble { padding: 10px 14px; border-radius: 18px; background: var(--soft); font-size: 15px; word-wrap: break-word; white-space: pre-wrap; border-bottom-left-radius: 5px; }
  .row.me .bubble { background: var(--grad); color:#fff; border-bottom-left-radius:18px; border-bottom-right-radius:5px; box-shadow: 0 4px 14px rgba(108,92,231,.28); }
  .time { font-size: 10px; color: var(--text3); margin-top: 4px; padding: 0 4px; }
  .row.me .time { text-align: right; }
  .bubble img.att { max-width: 260px; max-height: 220px; border-radius: 12px; display:block; }
  .bubble .file-att { display:flex; align-items:center; gap: 10px; text-decoration:none; color: inherit; }
  .bubble .file-att svg { width:26px; height:26px; }
  .bubble .file-att .fn { font-weight:700; font-size:14px; }
  .bubble .file-att .fs { font-size:12px; opacity:.7; }
  .empty { margin:auto; text-align:center; color: var(--text3); animation: fadeIn .5s both; }
  .empty .big { width:64px; height:64px; border-radius: 20px; background: var(--grad); color:#fff; display:flex;align-items:center;justify-content:center; margin: 0 auto 12px; animation: floatY 3s ease-in-out infinite; }
  .empty .big svg { width: 30px; height:30px; }
  .empty .t { font-weight:700; color: var(--text2); font-size: 17px; }
  .typing { height: 22px; padding: 0 22px; display:flex; align-items:center; gap: 8px; font-size: 13px; color: var(--text3); opacity:0; transition: opacity .2s; }
  .typing.show { opacity:1; }
  .typing .dots { display:inline-flex; gap:3px; }
  .typing .dots i { width:6px;height:6px;border-radius:50%; background: var(--a1); animation: dotB 1.2s infinite; }
  .typing .dots i:nth-child(2){ animation-delay:.2s; }
  .typing .dots i:nth-child(3){ animation-delay:.4s; }
  .composer { padding: 14px 18px 18px; }
  .composer .box { background: var(--soft); border: 2px solid transparent; border-radius: 18px; display:flex; align-items:flex-end; gap: 6px; padding: 6px; transition: border-color .15s, background .15s; }
  .composer .box:focus-within { border-color: var(--a1); background:#fff; }
  .composer textarea { flex:1; background:none; border:none; resize:none; font-size: 15px; padding: 9px 8px; max-height: 130px; color: var(--text); }
  .composer textarea:focus { outline:none; }
  .c-btn { width: 40px; height:40px; border-radius: 13px; color: var(--text2); display:flex;align-items:center;justify-content:center; transition: background .15s, transform .12s, box-shadow .15s; }
  .c-btn:hover { background: var(--soft2); }
  .c-btn:active { transform: scale(.9); }
  .c-btn.send { background: var(--grad); color:#fff; box-shadow: 0 5px 14px rgba(108,92,231,.35); }
  .c-btn.send:hover { filter: brightness(1.06); }
  .pop { position:absolute; top: 70px; right: 20px; width: 240px; background:#fff; border:1px solid var(--border); border-radius: 16px; box-shadow: 0 16px 40px rgba(33,31,43,.15); padding: 10px; z-index: 20; display:none; animation: popIn .2s both; }
  .pop.show { display:block; }
  .pop h4 { font-size: 11px; text-transform:uppercase; letter-spacing:.5px; color: var(--text3); padding: 6px 8px; }
  .pop .m { display:flex; align-items:center; gap:10px; padding: 8px; border-radius: 10px; }
  .pop .m:hover { background: var(--soft); }
  .pop .m .av { width:32px;height:32px;border-radius:10px; font-size:13px; }
  .pop .m .nm { font-size:14px; font-weight:600; }
  #call { position: fixed; inset: 0; z-index: 200; background: #17141f; display:none; flex-direction:column; }
  .call-head { padding: 18px 22px; display:flex; align-items:center; gap: 12px; color:#fff; }
  .call-head .badge { background: var(--grad-warm); font-size: 12px; font-weight:700; padding: 4px 10px; border-radius: 20px; animation: livePulse 1.6s infinite; }
  .call-head .t { font-weight: 700; }
  .grid { flex:1; display:grid; gap: 14px; padding: 18px; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); align-content:center; overflow:auto; }
  .tile { background:#221e2e; border-radius: 20px; overflow:hidden; position:relative; aspect-ratio:16/9; display:flex;align-items:center;justify-content:center; animation: tileIn .35s both; }
  .tile video { width:100%;height:100%;object-fit:cover; }
  .tile.mine video { transform: scaleX(-1); }
  .tile .ph { width: 76px; height:76px; border-radius: 24px; display:flex;align-items:center;justify-content:center; font-size:32px; font-weight:800; color:#fff; }
  .tile .label { position:absolute; bottom:12px; left:12px; background: rgba(0,0,0,.55); color:#fff; padding: 5px 12px; border-radius: 10px; font-size:13px; font-weight:600; }
  .call-bar { display:flex; align-items:center; justify-content:center; gap: 14px; padding: 22px; }
  .call-bar button { width: 56px; height:56px; border-radius: 50%; background: rgba(255,255,255,.12); color:#fff; display:flex;align-items:center;justify-content:center; transition: background .15s, transform .12s; }
  .call-bar button svg { width: 24px; height:24px; }
  .call-bar button:hover { background: rgba(255,255,255,.2); }
  .call-bar button:active { transform: scale(.9); }
  .call-bar button.active { background: var(--a1); }
  .call-bar button.off { background: #4a2436; color:#FF8AB0; }
  .call-bar button.end { background: #FF5C6E; width: 66px; }
  .toast { position: fixed; bottom: 26px; left:50%; transform: translateX(-50%); background:#211F2B; color:#fff; padding: 12px 20px; border-radius: 12px; z-index: 300; font-size: 14px; box-shadow: 0 12px 30px rgba(0,0,0,.3); animation: popIn .3s both; max-width: 90%; text-align:center; }
  .hidden { display:none !important; }
  @media (max-width: 820px) {
    #app { padding: 8px; }
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: fixed; left:8px; top:8px; bottom:8px; width: 280px; z-index: 50; transform: translateX(-320px); transition: transform .22s; }
    .sidebar.open { transform: none; }
    .row { max-width: 86%; }
  }
  @media (prefers-reduced-motion: reduce) { * { animation-duration:.001ms !important; transition-duration:.001ms !important; } }
</style>
</head>
<body>
<div id="login">
  <div class="login-card">
    <div class="mascot" id="mascot"></div>
    <h1>Chào mừng đến <b>Chóngu</b></h1>
    <p class="login-sub">Trò chuyện – Gọi video – Chia sẻ màn hình</p>
    <div class="field"><label>Tên của bạn</label><input id="loginName" placeholder="Ví dụ: Quốc Thiên" autocomplete="off" /></div>
    <div class="field"><label>Màu đại diện</label><div class="swatches" id="swatches"></div></div>
    <button class="btn" id="loginBtn">Bắt đầu trò chuyện</button>
    <p class="login-hint" id="loginHint"></p>
  </div>
</div>
<div id="app">
  <div class="layout">
    <div class="sidebar" id="sidebar">
      <div class="sb-head"><div class="logo" id="sbLogo"></div><div class="tt">Chóngu<span>Trực tuyến</span></div></div>
      <div class="sb-search"><input id="search" placeholder="Tìm phòng..." /></div>
      <div class="rooms-title">Phòng trò chuyện <button id="addRoom" title="Tạo phòng"></button></div>
      <div class="rooms" id="rooms"></div>
      <div class="me-card"><div class="av" id="meAva"></div><div class="info"><div class="n" id="meName">Bạn</div><div class="s">Đang hoạt động</div></div><button class="lo" id="logoutBtn" title="Đăng xuất"></button></div>
    </div>
    <div class="main">
      <div class="chat-head">
        <div class="av" id="headAva"></div>
        <div class="ci"><div class="t" id="roomTitle">chung</div><div class="d" id="roomDesc"></div></div>
        <div class="head-actions">
          <button class="stack" id="memberStack" title="Thành viên"></button>
          <button class="icon-btn" id="shareBtn" title="Chia sẻ màn hình"></button>
          <button class="icon-btn call" id="startCall" title="Gọi video"></button>
        </div>
        <div class="pop" id="memberPop"></div>
      </div>
      <div class="messages" id="messages"></div>
      <div class="typing" id="typing"></div>
      <div class="composer"><div class="box"><button class="c-btn" id="attachBtn" title="Đính kèm"></button><textarea id="input" rows="1" placeholder="Nhắn tin..."></textarea><button class="c-btn send" id="sendBtn" title="Gửi"></button></div></div>
    </div>
  </div>
</div>
<div id="call">
  <div class="call-head"><span class="badge">LIVE</span><span class="t" id="callTitle">Cuộc gọi</span></div>
  <div class="grid" id="callGrid"></div>
  <div class="call-bar">
    <button id="micBtn" class="active" title="Micro"></button>
    <button id="camBtn" class="active" title="Camera"></button>
    <button id="screenBtn" title="Chia sẻ màn hình"></button>
    <button id="endBtn" class="end" title="Kết thúc"></button>
  </div>
</div>
<input type="file" id="fileInput" class="hidden" multiple />

  phone:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/><line x1="23" y1="1" x2="1" y2="23"/></svg>',
  power:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>',
  file:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>'
};
const GRADS = ["linear-gradient(135deg,#6C5CE7,#A66CFF)","linear-gradient(135deg,#FF8A5B,#FF5C8A)","linear-gradient(135deg,#24C286,#4FD1C5)","linear-gradient(135deg,#4E9EF5,#6C5CE7)","linear-gradient(135deg,#F7B733,#FC4A1A)"];
const DEFAULT_ROOMS = [{ id:"chung", name:"chung", desc:"Kênh trò chuyện chung" },{ id:"random", name:"random", desc:"Chuyện linh tinh" },{ id:"cong-viec", name:"công việc", desc:"Trao đổi công việc" }];
const K = { user:"chongu_user", rooms:"chongu_rooms", msg:(c)=>"chongu_msg_"+c };
const mem = {};
const store = {
  get(k){ try { return localStorage.getItem(k); } catch(e){ return k in mem ? mem[k] : null; } },
  set(k,v){ try { localStorage.setItem(k,v); } catch(e){ mem[k]=v; } },
  del(k){ try { localStorage.removeItem(k); } catch(e){ delete mem[k]; } }
};
const mode = (CONFIG.SUPABASE_URL && CONFIG.SUPABASE_ANON_KEY && typeof supabase !== "undefined") ? "remote" : "local";
let sb=null, sbChannel=null;
let me=null, rooms=[], active="chung", bc=null, presence={}, seen=new Set(), typingState={}, msgStore={};
function uid(){ return Math.random().toString(36).slice(2)+Date.now().toString(36); }
function now(){ return Date.now(); }
function esc(s){ return (s||"").replace(/[&<>\"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'\"':"&quot;","'":"&#39;"}[c])); }
function fmtTime(t){ const d=new Date(t); return d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0"); }
function fmtDay(t){ const d=new Date(t), td=new Date(), y=new Date(Date.now()-864e5); if(d.toDateString()===td.toDateString()) return "Hôm nay"; if(d.toDateString()===y.toDateString()) return "Hôm qua"; return d.toLocaleDateString("vi-VN"); }
function bytes(n){ if(n<1024) return n+" B"; if(n<1048576) return (n/1024).toFixed(1)+" KB"; return (n/1048576).toFixed(1)+" MB"; }
function initial(s){ s=(s||"?").trim(); return s ? s[0].toUpperCase() : "?"; }
function grad(i){ return GRADS[((i||0)%GRADS.length+GRADS.length)%GRADS.length]; }
function hashIdx(id){ let h=0; for(const c of (id||"")) h=(h*31+c.charCodeAt(0))>>>0; return h; }
function avatarBox(name, color, cls){ return '<div class="av '+(cls||"")+'" style="background:'+grad(color)+'">'+esc(initial(name))+'</div>'; }
function toast(m){ const t=document.createElement("div"); t.className="toast"; t.textContent=m; document.body.appendChild(t); setTimeout(()=>t.remove(),2800); }
function loadRooms(){ const r=store.get(K.rooms); rooms = r?JSON.parse(r):DEFAULT_ROOMS.slice(); if(!r) store.set(K.rooms, JSON.stringify(rooms)); }
function saveRooms(){ store.set(K.rooms, JSON.stringify(rooms)); }
function loadLocalMsgs(c){ const r=store.get(K.msg(c)); return r?JSON.parse(r):[]; }
function saveLocalMsgs(c,a){ store.set(K.msg(c), JSON.stringify(a)); }
function getMsgs(room){ if(!(room in msgStore)){ msgStore[room] = (mode==="local") ? loadLocalMsgs(room) : []; } return msgStore[room]; }
function addMsg(room, msg){ const a=getMsgs(room); if(a.find(x=>x.id===msg.id)) return false; a.push(msg); a.sort((x,y)=>x.ts-y.ts); if(mode==="local") saveLocalMsgs(room,a); return true; }
function setIcons(){
  mascot.innerHTML=I.logo; sbLogo.innerHTML=I.logo; addRoom.innerHTML=I.plus; logoutBtn.innerHTML=I.power;
  shareBtn.innerHTML=I.screen; startCall.innerHTML=I.video; attachBtn.innerHTML=I.plus; sendBtn.innerHTML=I.send;
  micBtn.innerHTML=I.mic; camBtn.innerHTML=I.video; screenBtn.innerHTML=I.screen; endBtn.innerHTML=I.phone;
}
function $(id){ return document.getElementById(id); }
function initLogin(){
  const sw=$("swatches"); let sel=0;
  GRADS.forEach((g,i)=>{ const b=document.createElement("button"); b.style.background=g; if(i===0) b.classList.add("sel"); b.onclick=()=>{ sel=i; [...sw.children].forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); }; sw.appendChild(b); });
  $("loginHint").textContent = mode==="remote" ? "Đã kết nối máy chủ – mọi người ở các máy khác nhau đều chat được." : "Chế độ demo: mở 2 tab trên cùng máy để chat thử.";
  const go=()=>{ const name=$("loginName").value.trim(); if(!name){ toast("Nhập tên của bạn nhé"); return; } me={ id:uid(), name, color:sel }; store.set(K.user, JSON.stringify(me)); startApp(); };
  $("loginBtn").onclick=go;
  $("loginName").addEventListener("keydown",e=>{ if(e.key==="Enter") go(); });
}
function startApp(){
  $("login").style.display="none"; $("app").style.display="block";
  $("meAva").style.width="40px"; $("meAva").style.height="40px"; $("meAva").style.fontSize="16px"; $("meAva").style.background=grad(me.color); $("meAva").textContent=initial(me.name);
  $("meName").textContent=me.name;
  loadRooms(); renderRooms();
  if(mode==="remote") setupRemote(); else setupLocal();
  bindUI(); selectRoom(active);
}
function setupLocal(){
  try { bc=new BroadcastChannel("chongu"); } catch(e){ bc=null; }
  if(bc){
    bc.onmessage=(e)=>{ const m=e.data;
      if(m.type==="msg"){ if(addMsg(m.room, m.msg) && m.room===active) renderMessages(); }
      else if(m.type==="presence"){ presence[m.user.id]={...m.user, ts:now()}; renderMembers(); }
      else if(m.type==="leave"){ delete presence[m.userId]; renderMembers(); }
      else if(m.type==="rooms"){ loadRooms(); renderRooms(); }
      else if(m.type==="typing"){ if(m.user.id!==me.id){ typingState[m.user.id]={name:m.user.name, room:m.room, ts:now()}; renderTyping(); } }
      else if(m.type==="ping"){ bc.postMessage({type:"presence", user:me}); }
    };
    bc.postMessage({type:"presence", user:me}); bc.postMessage({type:"ping"});
    setInterval(()=>{ bc.postMessage({type:"presence", user:me}); const t=now(); Object.keys(presence).forEach(k=>{ if(k!==me.id && t-presence[k].ts>15000) delete presence[k]; }); renderMembers(); }, 5000);
    window.addEventListener("beforeunload",()=>{ try{ bc.postMessage({type:"leave", userId:me.id}); }catch(e){} });
  }
  presence[me.id]={...me, ts:now()}; startTypingPrune(); renderMembers();
}
function setupRemote(){
  sb = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
  sbChannel = sb.channel("chongu-room", { config:{ presence:{ key: me.id }, broadcast:{ self:false } } });
  sbChannel.on("postgres_changes", { event:"INSERT", schema:"public", table:"messages" }, ({ new:row })=>{ const msg={ id:row.id, userId:row.user_id, name:row.name, color:row.color, text:row.text, attachment:row.attachment, ts:row.ts, room:row.room }; if(addMsg(row.room, msg) && row.room===active) renderMessages(); });
  sbChannel.on("presence", { event:"sync" }, ()=>{ const st=sbChannel.presenceState(); presence={}; Object.values(st).forEach(arr=>arr.forEach(u=>presence[u.id]=u)); renderMembers(); });
  sbChannel.on("broadcast", { event:"typing" }, ({ payload })=>{ if(payload.user.id!==me.id){ typingState[payload.user.id]={ name:payload.user.name, room:payload.room, ts:now() }; renderTyping(); } });
  sbChannel.subscribe(async (s)=>{ if(s==="SUBSCRIBED"){ await sbChannel.track({ id:me.id, name:me.name, color:me.color }); } });
  presence[me.id]={...me}; startTypingPrune(); renderMembers();
}
function startTypingPrune(){ setInterval(()=>{ const t=now(); let ch=false; Object.keys(typingState).forEach(k=>{ if(t-typingState[k].ts>4000){ delete typingState[k]; ch=true; } }); if(ch) renderTyping(); }, 1500); }
async function fetchRemote(room){ const { data, error } = await sb.from("messages").select("*").eq("room", room).order("ts", { ascending:true }).limit(200); if(error){ toast("Không tải được tin nhắn"); return; } msgStore[room] = data.map(row=>({ id:row.id, userId:row.user_id, name:row.name, color:row.color, text:row.text, attachment:row.attachment, ts:row.ts, room:row.room })); if(room===active) renderMessages(); }
function renderRooms(filter){ const list=$("rooms"); list.innerHTML=""; rooms.filter(r=>!filter || r.name.toLowerCase().includes(filter)).forEach(r=>{ const b=document.createElement("button"); b.className="room"+(r.id===active?" active":""); b.innerHTML=avatarBox(r.name, hashIdx(r.id))+'<div class="rr"><div class="n">'+esc(r.name)+'</div><div class="d">'+esc(r.desc||"")+'</div></div>'; b.onclick=()=>selectRoom(r.id); list.appendChild(b); }); }
function selectRoom(id){ active=id; const r=rooms.find(x=>x.id===id)||rooms[0]; $("roomTitle").textContent=r.name; $("roomDesc").textContent=r.desc||""; const h=$("headAva"); h.style.width="44px"; h.style.height="44px"; h.style.fontSize="18px"; h.style.background=grad(hashIdx(r.id)); h.textContent=initial(r.name); $("input").placeholder="Nhắn tin tới "+r.name+"..."; renderRooms(); renderTyping(); if(mode==="remote" && !(id in msgStore)){ msgStore[id]=[]; renderMessages(); fetchRemote(id); } else renderMessages(); $("sidebar").classList.remove("open"); }
function renderMessages(){ const box=$("messages"); const arr=getMsgs(active); if(arr.length===0){ box.innerHTML='<div class="empty"><div class="big">'+I.logo+'</div><div class="t">Chưa có tin nhắn nào</div><div>Hãy gửi lời chào đầu tiên</div></div>'; return; } box.innerHTML=""; let lastDay="", lastUser="", lastTs=0;
  arr.forEach(m=>{ const day=fmtDay(m.ts); if(day!==lastDay){ const s=document.createElement("div"); s.className="day-sep"; s.textContent=day; box.appendChild(s); lastDay=day; lastUser=""; }
    const mine=m.userId===me.id; const grouped=m.userId===lastUser && (m.ts-lastTs)<300000;
    const row=document.createElement("div"); row.className="row"+(mine?" me":""); if(seen.has(m.id)) row.style.animation="none"; else seen.add(m.id);
    let att=""; if(m.attachment){ if(m.attachment.kind==="image") att='<img class="att" src="'+m.attachment.data+'" alt=""/>'; else att='<a class="file-att" href="'+m.attachment.data+'" download="'+esc(m.attachment.name)+'">'+I.file+'<span><span class="fn">'+esc(m.attachment.name)+'</span><br><span class="fs">'+bytes(m.attachment.size)+'</span></span></a>'; }
    const avatar = grouped ? '<div class="av" style="visibility:hidden"></div>' : avatarBox(m.name, m.color);
    const who = (!mine && !grouped) ? '<div class="who">'+esc(m.name)+'</div>' : "";
    row.innerHTML = avatar+'<div class="col">'+who+'<div class="bubble">'+(m.text?esc(m.text):"")+att+'</div><div class="time">'+fmtTime(m.ts)+'</div></div>';
    box.appendChild(row); lastUser=m.userId; lastTs=m.ts; });
  box.scrollTop=box.scrollHeight; }
function sendMessage(text, attachment){ if(!text && !attachment) return; const msg={ id:uid(), userId:me.id, name:me.name, color:me.color, text:text||"", attachment:attachment||null, ts:now(), room:active }; addMsg(active, msg); renderMessages();
  if(mode==="remote"){ sb.from("messages").insert({ id:msg.id, room:active, user_id:me.id, name:me.name, color:me.color, text:msg.text, attachment:msg.attachment, ts:msg.ts }).then(({ error })=>{ if(error) toast("Gửi thất bại – kiểm tra cấu hình Supabase"); }); }
  else if(bc){ bc.postMessage({type:"msg", room:active, msg}); } }
function memberList(){ const arr=Object.values(presence); if(!arr.find(m=>m.id===me.id)) arr.unshift({...me}); return arr; }
function renderMembers(){ const arr=memberList(); const stack=$("memberStack"); stack.innerHTML = arr.slice(0,3).map(m=>'<span class="s" style="background:'+grad(m.color)+'">'+esc(initial(m.name))+'</span>').join("") + (arr.length>3?'<span class="s more">+'+(arr.length-3)+'</span>':"");
  const pop=$("memberPop"); pop.innerHTML = '<h4>Thành viên – '+arr.length+'</h4>' + arr.map(m=>'<div class="m">'+avatarBox(m.name,m.color)+'<div class="nm">'+esc(m.name)+(m.id===me.id?" (bạn)":"")+'</div></div>').join(""); }
function renderTyping(){ const el=$("typing"); if(!el) return; const t=now(); const names=Object.values(typingState).filter(x=>x.room===active && t-x.ts<4000).map(x=>x.name); if(!names.length){ el.classList.remove("show"); el.innerHTML=""; return; } const who=names.length===1?names[0]:names.slice(0,2).join(", "); el.innerHTML='<span class="dots"><i></i><i></i><i></i></span> '+esc(who)+' đang nhập...'; el.classList.add("show"); }
function sendTyping(){ if(mode==="remote" && sbChannel){ sbChannel.send({ type:"broadcast", event:"typing", payload:{ room:active, user:{ id:me.id, name:me.name } } }); } else if(bc){ bc.postMessage({ type:"typing", room:active, user:{ id:me.id, name:me.name } }); } }
function bindUI(){
  const input=$("input"); const send=()=>{ const t=input.value.trim(); if(t){ sendMessage(t); input.value=""; input.style.height="auto"; } };
  $("sendBtn").onclick=send;
  input.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); send(); } });
  input.addEventListener("input",()=>{ input.style.height="auto"; input.style.height=Math.min(input.scrollHeight,130)+"px"; sendTyping(); });
  const fileInput=$("fileInput"); $("attachBtn").onclick=()=>fileInput.click();
  fileInput.onchange=()=>{ [...fileInput.files].forEach(f=>{ const cap=mode==="remote"?1048576:4194304; if(f.size>cap){ toast("File tối đa "+(cap/1048576)+"MB"); return; } const rd=new FileReader(); rd.onload=()=>sendMessage("", { kind: f.type.startsWith("image/")?"image":"file", name:f.name, size:f.size, data:rd.result }); rd.readAsDataURL(f); }); fileInput.value=""; };
  $("search").addEventListener("input",e=>renderRooms(e.target.value.toLowerCase().trim()));
  $("addRoom").onclick=()=>{ const name=prompt("Tên phòng mới:"); if(!name) return; const id=name.toLowerCase().replace(/\s+/g,"-"); if(rooms.find(r=>r.id===id)){ toast("Phòng đã tồn tại"); return; } rooms.push({ id, name, desc:"" }); saveRooms(); renderRooms(); selectRoom(id); if(bc) bc.postMessage({type:"rooms"}); };
  $("logoutBtn").onclick=()=>{ if(bc) try{ bc.postMessage({type:"leave", userId:me.id}); }catch(e){} store.del(K.user); location.reload(); };
  const pop=$("memberPop"); $("memberStack").onclick=(e)=>{ e.stopPropagation(); pop.classList.toggle("show"); }; document.addEventListener("click",()=>pop.classList.remove("show"));
  $("startCall").onclick=()=>startCall(false); $("shareBtn").onclick=()=>startCall(true);
}
let localStream=null, screenStream=null, micOn=true, camOn=true;
async function startCall(withScreen){ const el=$("call"); el.style.display="flex"; const r=rooms.find(x=>x.id===active)||rooms[0]; $("callTitle").textContent="Cuộc gọi – "+r.name; const grid=$("callGrid"); grid.innerHTML="";
  const mine=makeTile(me.name, me.color, me.name+" (bạn)", true); grid.appendChild(mine.tile);
  try { localStream=await navigator.mediaDevices.getUserMedia({ video:true, audio:true }); mine.video.srcObject=localStream; mine.video.classList.remove("hidden"); mine.ph.classList.add("hidden"); } catch(err){ toast("Không mở được camera – hiển thị ảnh đại diện thay thế"); }
  memberList().filter(u=>u.id!==me.id).slice(0,4).forEach(u=>grid.appendChild(makeTile(u.name,u.color,u.name,false).tile));
  micOn=true; camOn=true; updateCallBtns(); if(withScreen) shareScreen(); }
function makeTile(name, color, label, mine){ const tile=document.createElement("div"); tile.className="tile"+(mine?" mine":""); const video=document.createElement("video"); video.autoplay=true; video.playsInline=true; video.muted=mine; video.className="hidden"; const ph=document.createElement("div"); ph.className="ph"; ph.style.background=grad(color); ph.textContent=initial(name); const lb=document.createElement("div"); lb.className="label"; lb.textContent=label; tile.append(video,ph,lb); return { tile, video, ph }; }
function updateCallBtns(){ const mic=$("micBtn"), cam=$("camBtn"); mic.className=micOn?"active":"off"; mic.innerHTML=micOn?I.mic:I.micOff; cam.className=camOn?"active":"off"; cam.innerHTML=camOn?I.video:I.videoOff; }
async function shareScreen(){ try { screenStream=await navigator.mediaDevices.getDisplayMedia({ video:true }); const grid=$("callGrid"); const t=makeTile("S", me.color, me.name+" đang chia sẻ màn hình", false); grid.prepend(t.tile); t.video.srcObject=screenStream; t.video.classList.remove("hidden"); t.ph.classList.add("hidden"); $("screenBtn").classList.add("active"); screenStream.getVideoTracks()[0].onended=()=>{ t.tile.remove(); $("screenBtn").classList.remove("active"); screenStream=null; }; } catch(err){ toast("Đã hủy chia sẻ màn hình"); } }
function endCall(){ if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream=null; } if(screenStream){ screenStream.getTracks().forEach(t=>t.stop()); screenStream=null; } $("call").style.display="none"; $("screenBtn").classList.remove("active"); }
document.addEventListener("DOMContentLoaded",()=>{
  $("micBtn").onclick=()=>{ micOn=!micOn; if(localStream) localStream.getAudioTracks().forEach(t=>t.enabled=micOn); updateCallBtns(); };
  $("camBtn").onclick=()=>{ camOn=!camOn; if(localStream) localStream.getVideoTracks().forEach(t=>t.enabled=camOn); const mv=document.querySelector(".tile.mine video"), mp=document.querySelector(".tile.mine .ph"); if(mv&&mp){ if(camOn){ mv.classList.remove("hidden"); mp.classList.add("hidden"); } else { mv.classList.add("hidden"); mp.classList.remove("hidden"); } } updateCallBtns(); };
  $("screenBtn").onclick=()=>{ if(screenStream){ screenStream.getTracks().forEach(t=>t.stop()); } else shareScreen(); };
  $("endBtn").onclick=endCall;
});
setIcons(); initLogin();
(function(){ const s=store.get(K.user); if(s){ try{ me=JSON.parse(s); startApp(); }catch(e){} } })();
</script>
